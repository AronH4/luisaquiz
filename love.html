<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACCESS GRANTED</title>

  <style>

    body {

      margin: 0;

      background: black;

      color: #00ff66;

      font-family: "Courier New", monospace;

      display: flex;

      justify-content: center;
      align-items: center;

      flex-direction: column;

      height: 100vh;

      overflow: hidden;

      text-align: center;
    }

    /* Matrix / Hacker Effekt */

    #loading {

      position: absolute;

      font-size: 28px;

      animation: flicker 0.08s infinite;

      text-shadow: 0 0 10px #00ff66;
    }

    @keyframes flicker {

      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

#content {

  display: none;

  flex-direction: column;

  justify-content: center;
  align-items: center;

  animation: fadeIn 2s ease forwards;
}

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    img {

      width: 650px;

      max-width: 92vw;

      border-radius: 20px;

      border: 3px solid #00ff66;

      box-shadow: 0 0 40px #00ff66;

      margin-bottom: 35px;
    }

    h1 {

      margin-top: 0px;

      font-size: 64px;

        text-shadow:
    0 0 10px #00ff66,
    0 0 20px #00ff66,
    0 0 40px #00ff66;

  animation: pulse 2s infinite;
    }
@keyframes pulse {

  0% {
    transform: scale(1);
  }

  50% {
    transform: scale(1.03);
  }

  100% {
    transform: scale(1);
  }
}
  </style>
</head>
<body>

  <div id="loading">

    INITIALIZING SYSTEM...<br><br>

    ACCESSING ENCRYPTED MEMORY...<br><br>

    DECRYPTING FEELINGS...<br><br>

    ❤️

  </div>

  <div id="content">

    <img src="love.jpeg" alt="Love Image">

    <h1>
      Ich liebe dich! ❤️
    </h1>

  </div>

  <script>

    setTimeout(() => {

      document
        .getElementById("loading")
        .style.display = "none";

      document
        .getElementById("content")
        .style.display = "flex";

    }, 3500);

  </script>

</body>
</html>
