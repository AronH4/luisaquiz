<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Access</title>

  <style>

    body {
      background-color: black;
      color: #00ff66;

      font-family: "Courier New", monospace;

      margin: 0;
      padding: 40px;

      text-align: center;

      text-shadow: 0 0 8px #00ff66;
    }

    h1 {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    #timer {

      font-size: 48px;

      margin-bottom: 30px;

      color: #00ff66;

      text-shadow: 0 0 15px #00ff66;
    }

    .container {

      display: grid;

      grid-template-columns: repeat(2, 1fr);

      gap: 40px;

      max-width: 500px;
      margin: auto;
    }

    .qr-box {

      background-color: #050505;

      padding: 20px;

      border: 2px solid #00ff66;

      border-radius: 12px;

      box-shadow: 0 0 15px #00ff66;
    }

    .qr-box img {

      width: 150px;
      height: 150px;

      object-fit: contain;

      background: white;

      padding: 10px;

      border-radius: 10px;
    }

    #voiceButton {

      margin-top: 50px;

      padding: 15px 30px;

      background: black;
      color: #00ff66;

      border: 2px solid #00ff66;

      border-radius: 10px;

      font-size: 18px;

      font-family: "Courier New", monospace;

      cursor: pointer;

      box-shadow: 0 0 15px #00ff66;
    }

    #voiceButton:hover {
      background: #00ff66;
      color: black;
    }

    #status {

      margin-top: 20px;

      font-size: 18px;

      min-height: 30px;
    }

  </style>
</head>
<body>

  <h1>FINAL ACCESS CHECK</h1>

  <div id="timer">
    4:00
  </div>

  <div class="container">

    <div class="qr-box">
      <h2>1</h2>
      <img src="qr1.png" alt="QR 1">
    </div>

    <div class="qr-box">
      <h2>2</h2>
      <img src="qr2.png" alt="QR 2">
    </div>

    <div class="qr-box">
      <h2>3</h2>
      <img src="qr3.png" alt="QR 3">
    </div>

    <div class="qr-box">
      <h2>4</h2>
      <img src="qr4.png" alt="QR 4">
    </div>

  </div>

  <button id="voiceButton" onclick="startVoiceRecognition()">
    FUNKMELDEEMPFÄNGER
  </button>

  <div id="status"></div>

  <audio id="successAudio" src="audio.mp3"></audio>

  <script>

    // -------------------------
    // TIMER
    // -------------------------

    let timeLeft = 240;

    const timerElement =
      document.getElementById("timer");

    const countdown = setInterval(function() {

      let minutes =
        Math.floor(timeLeft / 60);

      let seconds =
        timeLeft % 60;

      if (seconds < 10) {
        seconds = "0" + seconds;
      }

      timerElement.innerHTML =
        minutes + ":" + seconds;

      timeLeft--;

      if (timeLeft < 0) {

        clearInterval(countdown);

        window.location.href = "index.html";
      }

    }, 1000);

    // -------------------------
    // VOICE RECOGNITION
    // -------------------------

let recognitionRunning = false;

function startVoiceRecognition() {

  if (recognitionRunning) {
    return;
  }

  recognitionRunning = true;

  const status =
    document.getElementById("status");

  status.innerHTML = "LISTENING...";

  const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

  if (!SpeechRecognition) {

    status.innerHTML =
      "VOICE RECOGNITION NOT SUPPORTED";

    recognitionRunning = false;

    return;
  }

  const recognition =
    new SpeechRecognition();

  recognition.lang = "de-DE";

  recognition.continuous = false;

  recognition.interimResults = false;

  let recognizedText = "";

  recognition.start();

  // Automatisch nach 8 Sekunden stoppen
  const stopTimer = setTimeout(() => {

    recognition.stop();

  }, 8000);

  recognition.onresult = function(event) {

    recognizedText =
      event.results[0][0].transcript
      .toLowerCase()
      .trim();

    console.log("Erkannt:", recognizedText);

    if (
      recognizedText.includes("ich liebe dich")
    ) {

      status.innerHTML =
        "ACCESS GRANTED";

      const audio =
        document.getElementById("successAudio");

      audio.currentTime = 0;

      audio.play().catch(function(error) {

        console.log("Audio Fehler:", error);

        status.innerHTML =
          "AUDIO BLOCKED";

      });

    } else {

      status.innerHTML =
        "ACCESS DENIED";
    }

  };

  // Wenn Sprache endet
  recognition.onspeechend = function() {

    recognition.stop();
  };

  // Wenn Recognition komplett endet
  recognition.onend = function() {

    clearTimeout(stopTimer);

    if (recognizedText === "") {

      status.innerHTML =
        "NO VOICE DETECTED";
    }

    recognitionRunning = false;
  };

  recognition.onerror = function(event) {

    console.log(event.error);

    status.innerHTML =
      "VOICE ERROR: " + event.error;

    recognitionRunning = false;
  };

}

  </script>

</body>
</html>
