<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Access</title>

  <style>

    body {
      background-color: black;
      color: #00ff66;

      font-family: "Courier New", monospace;

      margin: 0;
      padding: 40px;

      text-align: center;

      text-shadow: 0 0 8px #00ff66;
    }

    h1 {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    #timer {

      font-size: 48px;

      margin-bottom: 40px;

      color: #00ff66;

      text-shadow: 0 0 15px #00ff66;
    }

    .container {

      display: grid;

      grid-template-columns: repeat(2, 1fr);

      gap: 40px;

      max-width: 800px;
      margin: auto;
    }

    .qr-box {

      background-color: #050505;

      padding: 20px;

      border: 2px solid #00ff66;

      border-radius: 12px;

      box-shadow: 0 0 15px #00ff66;
    }

    .qr-box img {

      width: 200px;
      height: 200px;

      object-fit: contain;

      background: white;

      padding: 10px;

      border-radius: 10px;
    }

  </style>
</head>
<body>

  <h1>QR ACCESS</h1>

  <div id="timer">
    01:00
  </div>

  <div class="container">

    <div class="qr-box">
      <h2>1</h2>
      <img src="qr1.png" alt="QR 1">
    </div>

    <div class="qr-box">
      <h2>2</h2>
      <img src="qr2.png" alt="QR 2">
    </div>

    <div class="qr-box">
      <h2>3</h2>
      <img src="qr3.png" alt="QR 3">
    </div>

    <div class="qr-box">
      <h2>4</h2>
      <img src="qr4.png" alt="QR 4">
    </div>

  </div>

  <script>

    let timeLeft = 60;

    const timerElement =
      document.getElementById("timer");

    const countdown = setInterval(function() {

      let minutes =
        Math.floor(timeLeft / 60);

      let seconds =
        timeLeft % 60;

      if (seconds < 10) {
        seconds = "0" + seconds;
      }

      timerElement.innerHTML =
        minutes + ":" + seconds;

      timeLeft--;

      if (timeLeft < 0) {

        clearInterval(countdown);

        window.location.href = "index.html";
      }

    }, 1000);

  </script>

</body>
</html>
