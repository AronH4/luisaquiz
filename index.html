<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Terminal</title>

  <style>

    body {
      margin: 0;
      background-color: black;
      color: #00ff66;

      font-family: "Courier New", monospace;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;
      flex-direction: column;

      text-shadow: 0 0 8px #00ff66;
    }

    h1 {
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    input {
      padding: 12px;
      width: 320px;

      background: black;
      color: #00ff66;

      border: 2px solid #00ff66;
      border-radius: 8px;

      font-size: 16px;
      font-family: "Courier New", monospace;

      outline: none;

      box-shadow: 0 0 10px #00ff66;
    }

    button {

      margin-top: 20px;

      padding: 12px 25px;

      background: black;
      color: #00ff66;

      border: 2px solid #00ff66;
      border-radius: 8px;

      font-size: 16px;
      font-family: "Courier New", monospace;

      cursor: pointer;

      box-shadow: 0 0 10px #00ff66;
    }

    button:hover {
      background-color: #00ff66;
      color: black;
    }

  </style>
</head>
<body>

  <h1>ACCESS TERMINAL</h1>

  <input
    type="password"
    id="passwordInput"
    placeholder="ENTER PASSWORD"
  >

  <button onclick="checkPassword()">
    ENTER
  </button>

  <script>

    function checkPassword() {

      const correctPassword =
        "liebiskusloki1782blau0.3105samstagseoul";

      const enteredPassword =
        document.getElementById("passwordInput").value;

      if (enteredPassword === correctPassword) {

        window.location.href = "codes.html";

      } else {

        alert("ACCESS DENIED");

      }
    }

    document
      .getElementById("passwordInput")
      .addEventListener("keypress", function(event) {

        if (event.key === "Enter") {
          checkPassword();
        }

      });

  </script>

</body>
</html>
